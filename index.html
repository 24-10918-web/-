<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해양 산성화 시뮬레이션</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide-react"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body, html, #root {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b1329;
            color: #ffffff;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 코드가 외부 모듈(import) 형식 대신 전역 변수를 바라보도록 설정
        window.lucide = window['lucide-react'] || {};
        window.Recharts = window.Recharts || {};
        
        // 코드 내부의 import 구문이 에러 나지 않도록 가짜 전역 환경(mock) 조성
        window.exports = {};
        window.require = function(moduleName) {
            if (moduleName === 'lucide-react') return window.lucide;
            if (moduleName === 'recharts') return window.Recharts;
            return {};
        };
    </script>

    <script type="text/babel" src="clownfish_survival.jsx"></script>

    <script type="text/babel">
        window.addEventListener('DOMContentLoaded', () => {
            // 코드 하단의 export default ClownfishSimulation 이름을 찾아와 타겟팅합니다.
            const TargetComponent = typeof ClownfishSimulation !== 'undefined' ? ClownfishSimulation : null;
            
            if (TargetComponent) {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(React.createElement(TargetComponent));
            } else {
                document.getElementById('root').innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <h2>시뮬레이션을 로드할 수 없습니다.</h2>
                        <p>clownfish_survival.jsx 파일 내의 ClownfishSimulation 컴포넌트를 찾지 못했습니다.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
